<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FarmaFind</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #1a7a4a;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    font-family: 'Nunito', sans-serif;
  }

  .splash {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
    animation: fadeIn 0.5s ease forwards;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: scale(0.92); }
    to   { opacity: 1; transform: scale(1); }
  }

  /* ── Logo icon ── */
  .logo-wrap {
    position: relative;
    width: 130px;
    height: 130px;
  }

  /* Pulse ring */
  .pulse-ring {
    position: absolute;
    inset: -18px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.25);
    animation: pulseRing 2s ease-out infinite;
  }
  .pulse-ring:nth-child(2) { animation-delay: 0.7s; }

  @keyframes pulseRing {
    0%   { transform: scale(0.8); opacity: 0.6; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  /* White circle background */
  .logo-bg {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: #ffffff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    position: relative;
    z-index: 2;
    animation: logoEntrance 2.1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
  }

  @keyframes logoEntrance {
    from { transform: scale(0) rotate(-45deg); opacity: 0; }
    to   { transform: scale(1) rotate(0deg);   opacity: 1; }
  }

  /* Cross SVG inside the circle */
  .cross-svg {
    width: 72px;
    height: 72px;
    animation: crossDraw 0.9s ease 0.85s both;
  }

  @keyframes crossDraw {
    from { stroke-dashoffset: 600; opacity: 0.3; }
    to   { stroke-dashoffset: 0;   opacity: 1; }
  }

  /* ── Brand name ── */
  .brand {
    text-align: center;
    animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.6s both;
  }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  .brand-name {
    font-size: 42px;
    font-weight: 900;
    color: #ffffff;
    letter-spacing: -0.5px;
    line-height: 1;
  }

  .brand-name span {
    color: #a8edcb;
  }

  .brand-tagline {
    font-size: 14px;
    font-weight: 600;
    color: rgba(255,255,255,0.65);
    letter-spacing: 2.5px;
    text-transform: uppercase;
    margin-top: 6px;
  }

  /* ── Loading dots ── */
  .dots {
    display: flex;
    gap: 8px;
    animation: slideUp 0.5s ease 1.2s both;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.4);
    animation: dotBounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(1) { animation-delay: 0s; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dotBounce {
    0%, 60%, 100% { transform: translateY(0);   background: rgba(255,255,255,0.4); }
    30%            { transform: translateY(-8px); background: rgba(255,255,255,0.9); }
  }

  /* ── Background decorative circles ── */
  .bg-circle {
    position: fixed;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .bg-circle-1 { width: 420px; height: 420px; top: -140px; right: -100px; }
  .bg-circle-2 { width: 320px; height: 320px; bottom: -80px; left: -80px; }
  .bg-circle-3 { width: 180px; height: 180px; bottom: 80px; right: 60px; background: rgba(255,255,255,0.06); }

  /* ── Fade out transition ── */
  .splash-fade-out {
    animation: fadeOut 0.5s ease forwards !important;
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }
</style>
</head>
<body>

<div class="bg-circle bg-circle-1"></div>
<div class="bg-circle bg-circle-2"></div>
<div class="bg-circle bg-circle-3"></div>

<div class="splash" id="splash">

  <div class="logo-wrap">
    <div class="pulse-ring"></div>
    <div class="pulse-ring"></div>
    <div class="logo-bg">
      <!-- Cross icon replicating the uploaded logo -->
      <svg class="cross-svg" viewBox="0 0 100 100" fill="none"
           xmlns="http://www.w3.org/2000/svg">
        <path
          d="M35 12
             C35 9.8 36.8 8 39 8
             H61
             C63.2 8 65 9.8 65 12
             V35
             H88
             C90.2 35 92 36.8 92 39
             V61
             C92 63.2 90.2 65 88 65
             H65
             V74
             C65 74 65 84 58 88
             C55 89.6 52.5 90 50 90
             C50 90 50 90 50 90
             C47.5 90 45 89.6 42 88
             C35 84 35 74 35 74
             V65
             H12
             C9.8 65 8 63.2 8 61
             V39
             C8 36.8 9.8 35 12 35
             H35 Z"
          stroke="#1a7a4a"
          stroke-width="7"
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-dasharray="600"
          stroke-dashoffset="600"
          fill="none"
          style="animation: crossDraw 0.9s ease 0.85s forwards;"
        />
      </svg>
    </div>
  </div>

  <div class="brand">
    <div class="brand-name">Farma<span>Find</span></div>
    <div class="brand-tagline">A sua farmácia mais perto</div>
  </div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div>

<script>
  // Redirect to index.html after 2.8s (0.5s fadeOut + 2.3s display)
  setTimeout(() => {
    document.getElementById('splash').classList.add('splash-fade-out');
    setTimeout(() => {
      window.location.href = 'encontre.html';
    }, 500);
  }, 5300);
</script>

</body>
</html>
